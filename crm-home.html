<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise CRM V10 - Rich Data Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --cy-orange: #ff9800; --cy-blue: #00a1e9; --cy-bg: #f7f9fa; --cy-border: #e3e7e8; }
        body { background-color: var(--cy-bg); }
        .cy-header { background-color: #333; color: white; }
        .cy-nav-item { border-bottom: 4px solid transparent; }
        .cy-nav-item.active { border-bottom-color: var(--cy-orange); color: var(--cy-orange); font-weight: bold; }
        .btn-cy-primary { background-color: var(--cy-blue); color: white; border-radius: 4px; transition: opacity 0.2s; }
        .btn-cy-primary:hover { opacity: 0.8; }
        .btn-cy-edit { color: var(--cy-blue); border: 1px solid var(--cy-blue); border-radius: 4px; background: white; padding: 2px 8px; font-size: 11px; }
        .btn-cy-edit:hover { background-color: #e6f6ff; }
        .cy-table-header { background-color: #f2f2f2; border-bottom: 2px solid var(--cy-border); }
        .required::after { content: " *"; color: #e74c3c; font-weight: bold; }
        input:disabled { background-color: #f5f5f5; cursor: not-allowed; }
        .success-pop { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="text-gray-700 font-sans min-h-screen text-sm">

    <header class="cy-header p-2 flex justify-between items-center shadow-md">
        <div class="flex items-center space-x-4">
            <div class="bg-orange-500 p-1 rounded font-bold text-white text-xs">CRM</div>
            <h1 class="font-bold text-base">顧客管理システム V10</h1>
        </div>
        <div class="flex items-center space-x-4">
            <select onchange="changeLanguage(this.value)" id="lang-selector" class="bg-transparent border border-gray-500 text-white text-[10px] rounded px-2 py-1 outline-none">
                <option value="ja" class="text-black">日本語 (JP)</option>
                <option value="en" class="text-black">English (EN)</option>
            </select>
            <div class="w-7 h-7 bg-blue-500 rounded-md flex items-center justify-center text-[10px] font-bold">USR</div>
        </div>
    </header>

    <nav class="bg-white border-b flex space-x-10 px-10 text-xs shadow-sm sticky top-0 z-40">
        <button onclick="switchTab('home')" id="tab-home" class="cy-nav-item py-4 active" data-i18n="nav_home">ポータル</button>
        <button onclick="switchTab('accounts')" id="tab-accounts" class="cy-nav-item py-4" data-i18n="nav_accounts">取引先一覧</button>
        <button onclick="switchTab('opps')" id="tab-opps" class="cy-nav-item py-4" data-i18n="nav_opps">商談管理</button>
    </nav>

    <main class="p-6 max-w-[1400px] mx-auto">
        <div id="view-accounts" class="hidden">
            <div class="bg-white p-6 rounded shadow-sm border border-gray-200">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-lg font-bold" data-i18n="acc_title">取引先一覧</h2>
                    <button onclick="openAccountModal()" id="btn-new-account" class="btn-cy-primary px-5 py-2 font-bold shadow-sm" data-i18n="btn_new_acc">+ 新規レコード追加</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-xs border-collapse">
                        <thead class="cy-table-header text-gray-600 font-bold">
                            <tr>
                                <th class="p-3 border">操作</th>
                                <th class="p-3 border" data-i18n="th_acc_name">取引先名</th>
                                <th class="p-3 border" data-i18n="lbl_industry">業種</th>
                                <th class="p-3 border" data-i18n="lbl_employees">従業員数</th>
                                <th class="p-3 border" data-i18n="lbl_address">都道府県</th>
                            </tr>
                        </thead>
                        <tbody id="account-table-body" class="bg-white"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="view-opps" class="hidden">
            <div class="bg-white p-6 rounded shadow-sm border border-gray-200">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-lg font-bold" data-i18n="nav_opps">商談管理</h2>
                    <button onclick="openOppModal()" id="btn-new-opp" class="btn-cy-primary px-5 py-2 font-bold shadow-sm" data-i18n="btn_new_opp">+ 新規商談登録</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-xs border-collapse">
                        <thead class="cy-table-header text-gray-600 font-bold">
                            <tr>
                                <th class="p-3 border">操作</th>
                                <th class="p-3 border">商談名</th>
                                <th class="p-3 border">取引先</th>
                                <th class="p-3 border text-right">金額 (円)</th>
                                <th class="p-3 border">フェーズ</th>
                                <th class="p-3 border">予定日</th>
                            </tr>
                        </thead>
                        <tbody id="opp-table-body" class="bg-white"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="view-home" class="grid grid-cols-3 gap-6">
            <div class="col-span-2 space-y-6">
                <div class="bg-white p-6 rounded border border-gray-200 shadow-sm">
                    <h3 class="font-bold border-b pb-2 mb-4 text-blue-600">最新の商談状況</h3>
                    <div class="h-40 bg-gray-50 flex items-center justify-center border rounded border-dashed text-gray-400">Activity Chart Area</div>
                </div>
            </div>
            <div class="space-y-6">
                <div class="bg-white p-6 rounded border border-gray-200 shadow-sm">
                    <h3 class="font-bold border-b pb-2 mb-4 text-orange-600">お知らせ</h3>
                    <p class="text-xs text-gray-500">2026/04/17: システムメンテナンスの通知</p>
                </div>
            </div>
        </div>
    </main>

    <div id="modal-account" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-[100]">
        <div class="bg-white rounded shadow-2xl w-[700px] max-h-[90vh] overflow-y-auto">
            <div class="bg-gray-100 p-4 font-bold border-b flex justify-between items-center sticky top-0">
                <span id="acc-modal-title">レコードの編集</span>
                <button onclick="closeModal('modal-account')" class="text-gray-400 text-xl">✕</button>
            </div>
            <div class="p-8 space-y-4">
                <input type="hidden" id="acc-edit-index">
                <div class="flex items-center"><label class="w-32 font-bold required">取引先名</label><input type="text" id="acc-name" class="flex-1 border p-2 rounded"></div>
                <div class="flex items-center"><label class="w-32 font-bold">業種</label><select id="acc-industry" class="flex-1 border p-2 rounded"><option>IT</option><option>製造業</option><option>卸売</option><option>サービス</option></select></div>
                <div class="flex items-center"><label class="w-32 font-bold">従業員数</label><input type="number" id="acc-employees" class="w-32 border p-2 rounded"></div>
                <div class="grid grid-cols-2 gap-4 border-t pt-4">
                    <input type="text" id="acc-zip" class="border p-2 rounded" placeholder="郵便番号">
                    <select id="acc-pref" class="border p-2 rounded"><option>東京都</option><option>大阪府</option><option>愛知県</option><option>福岡県</option></select>
                    <input type="text" id="acc-city" class="border p-2 rounded" placeholder="市区町村">
                    <input type="text" id="acc-street" class="border p-2 rounded" placeholder="番地">
                </div>
                <textarea id="acc-remarks" class="w-full border p-2 rounded h-20" placeholder="備考"></textarea>
            </div>
            <div class="bg-gray-50 p-4 border-t flex justify-center"><button onclick="saveAccount()" class="bg-blue-500 text-white px-12 py-2 rounded font-bold">保存</button></div>
        </div>
    </div>

    <div id="modal-opp" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-[100]">
        <div class="bg-white rounded shadow-2xl w-[700px] max-h-[90vh] overflow-y-auto">
            <div class="bg-gray-100 p-4 font-bold border-b flex justify-between items-center sticky top-0">商談の編集/登録</div>
            <div class="p-8 space-y-5">
                <input type="hidden" id="opp-edit-index">
                <div><label class="block font-bold mb-1 required">商談名</label><input type="text" id="opp-name" class="w-full border p-2 rounded"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block font-bold mb-1 required">取引先</label><select id="opp-acc-id" class="w-full border p-2 rounded"></select></div>
                    <div><label class="block font-bold mb-1">金額 (円)</label><input type="number" id="opp-amount" class="w-full border p-2 rounded"></div>
                    <div><label class="block font-bold mb-1">ステージ</label><select id="opp-stage" class="w-full border p-2 rounded">
                        <option>1. 見込み把握</option><option>2. 提案</option><option>3. 最終交渉</option><option>4. 受注</option></select></div>
                    <div><label class="block font-bold mb-1">クローズ予定日</label><input type="date" id="opp-date" class="w-full border p-2 rounded"></div>
                </div>
                <div class="bg-blue-50 p-4 rounded flex items-center space-x-4">
                    <label class="flex items-center font-bold cursor-pointer"><input type="checkbox" id="opp-comp-check" class="mr-2" onchange="toggleCompetitor(this.checked)">競合有り</label>
                    <input type="text" id="opp-comp-name" class="flex-1 border p-2 rounded" disabled placeholder="競合名">
                </div>
                <textarea id="opp-memo" class="w-full border p-2 rounded h-20" placeholder="商談メモ"></textarea>
            </div>
            <div class="bg-gray-50 p-4 border-t flex justify-center"><button onclick="saveOpp()" class="bg-blue-500 text-white px-12 py-2 rounded font-bold">保存</button></div>
        </div>
    </div>

    <div id="success-toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 bg-blue-600 text-white px-10 py-3 rounded shadow-2xl hidden z-[200] success-pop font-bold">保存しました。</div>

    <script>
        // --- テストデータ増量 ---
        let accounts = [
            { name: "サンプルテクノロジー株式会社", industry: "IT", employees: 1250, zip:"100-0001", pref:"東京都", city:"千代田区", street:"1-1", remarks:"" },
            { name: "未来ソリューションズ", industry: "IT", employees: 450, zip:"530-0001", pref:"大阪府", city:"北区", street:"2-2", remarks:"" },
            { name: "エコアース・マニュファクチャリング", industry: "製造業", employees: 8900, zip:"471-0001", pref:"愛知県", city:"豊田市", street:"3-3", remarks:"" },
            { name: "オーシャン貿易株式会社", industry: "卸売", employees: 210, zip:"231-0001", pref:"神奈川県", city:"中区", street:"4-4", remarks:"" },
            { name: "デジタルフロンティア・ラボ", industry: "IT", employees: 15, zip:"150-0001", pref:"東京都", city:"渋谷区", street:"5-5", remarks:"" },
            { name: "プレミアムサービス日本", industry: "サービス", employees: 640, zip:"060-0001", pref:"北海道", city:"中央区", street:"6-6", remarks:"" },
            { name: "スターライト・マーケティング", industry: "サービス", employees: 120, zip:"106-0001", pref:"東京都", city:"港区", street:"7-7", remarks:"" },
            { name: "サン食品株式会社", industry: "製造業", employees: 1500, zip:"650-0001", pref:"兵庫県", city:"中央区", street:"8-8", remarks:"" },
            { name: "日本インフラ通信", industry: "IT", employees: 3000, zip:"101-0001", pref:"東京都", city:"千代田区", street:"9-9", remarks:"" },
            { name: "スカイ建設株式会社", industry: "製造業", employees: 2200, zip:"810-0001", pref:"福岡県", city:"博多区", street:"10-10", remarks:"" },
            { name: "ライトハウス・デザイン", industry: "サービス", employees: 45, zip:"150-0001", pref:"東京都", city:"目黒区", street:"11", remarks:"" },
            { name: "銀河生命保険", industry: "サービス", employees: 12000, zip:"100-0001", pref:"東京都", city:"新宿区", street:"12", remarks:"" },
            { name: "アーバン不動産", industry: "卸売", employees: 310, zip:"541-0001", pref:"大阪府", city:"中央区", street:"13", remarks:"" },
            { name: "テック・エデュケーション", industry: "IT", employees: 90, zip:"460-0001", pref:"愛知県", city:"中区", street:"14", remarks:"" },
            { name: "バイオ・ヘルステック", industry: "製造業", employees: 180, zip:"812-0001", pref:"福岡県", city:"東区", street:"15", remarks:"" }
        ];

        let opps = [
            { name: "基幹システムのリプレイス", acc: "サンプルテクノロジー株式会社", amount: 5500000, stage: "2. 提案", date: "2026-06-30", comp: true, compName: "ライバル社", memo: "大型案件" },
            { name: "サーバー保守契約更新", acc: "未来ソリューションズ", amount: 1200000, stage: "3. 最終交渉", date: "2026-05-15", comp: false, compName: "", memo: "" },
            { name: "新工場ライン自動化プロジェクト", acc: "エコアース・マニュファクチャリング", amount: 25000000, stage: "1. 見込み把握", date: "2026-12-20", comp: true, compName: "Global Auto", memo: "競合激しい" },
            { name: "AIチャットボット導入", acc: "デジタルフロンティア・ラボ", amount: 800000, stage: "2. 提案", date: "2026-04-28", comp: false, compName: "", memo: "" },
            { name: "広告運用アウトソーシング", acc: "スターライト・マーケティング", amount: 300000, stage: "4. 受注", date: "2026-04-10", comp: false, compName: "", memo: "スピード受注" },
            { name: "物流DXパッケージ", acc: "オーシャン貿易株式会社", amount: 4800000, stage: "1. 見込み把握", date: "2026-08-01", comp: false, compName: "", memo: "" }
        ];

        let currentLang = 'ja';

        function render() {
            // 取引先テーブル
            document.getElementById('account-table-body').innerHTML = accounts.map((a, i) => `
                <tr class="hover:bg-gray-50 border-b">
                    <td class="p-2 border text-center"><button onclick="openAccountModal(${i})" class="btn-cy-edit">編集</button></td>
                    <td class="p-3 border font-bold text-blue-600">${a.name}</td>
                    <td class="p-3 border">${a.industry}</td>
                    <td class="p-3 border text-right">${a.employees.toLocaleString()}</td>
                    <td class="p-3 border">${a.pref}</td>
                </tr>
            `).join('');

            // 商談テーブル
            document.getElementById('opp-table-body').innerHTML = opps.map((o, i) => `
                <tr class="hover:bg-gray-50 border-b">
                    <td class="p-2 border text-center"><button onclick="openOppModal(${i})" class="btn-cy-edit">編集</button></td>
                    <td class="p-3 border font-bold">${o.name}</td>
                    <td class="p-3 border text-blue-600">${o.acc}</td>
                    <td class="p-3 border text-right">¥${o.amount.toLocaleString()}</td>
                    <td class="p-3 border"><span class="px-2 py-1 rounded-full text-[10px] ${o.stage.includes('受注') ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'}">${o.stage}</span></td>
                    <td class="p-3 border">${o.date}</td>
                </tr>
            `).join('');

            // 商談モーダルの取引先セレクト
            const sel = document.getElementById('opp-acc-id');
            sel.innerHTML = '<option value="">--選択--</option>' + accounts.map(a => `<option value="${a.name}">${a.name}</option>`).join('');
        }

        // --- モーダル制御ロジック ---
        function openAccountModal(index = null) {
            const isEdit = index !== null;
            document.getElementById('acc-edit-index').value = isEdit ? index : "";
            document.getElementById('acc-modal-title').innerText = isEdit ? "レコードの編集" : "レコードの追加";
            const data = isEdit ? accounts[index] : { name:"", industry:"", employees:"", zip:"", pref:"", city:"", street:"", remarks:"" };
            document.getElementById('acc-name').value = data.name;
            document.getElementById('acc-industry').value = data.industry;
            document.getElementById('acc-employees').value = data.employees;
            document.getElementById('acc-zip').value = data.zip;
            document.getElementById('acc-pref').value = data.pref;
            document.getElementById('acc-city').value = data.city;
            document.getElementById('acc-street').value = data.street;
            document.getElementById('acc-remarks').value = data.remarks;
            document.getElementById('modal-account').classList.remove('hidden');
        }

        function saveAccount() {
            const idx = document.getElementById('acc-edit-index').value;
            const newData = {
                name: document.getElementById('acc-name').value, industry: document.getElementById('acc-industry').value,
                employees: parseInt(document.getElementById('acc-employees').value || 0),
                zip: document.getElementById('acc-zip').value, pref: document.getElementById('acc-pref').value,
                city: document.getElementById('acc-city').value, street: document.getElementById('acc-street').value,
                remarks: document.getElementById('acc-remarks').value
            };
            if(idx === "") accounts.unshift(newData); else accounts[idx] = newData;
            closeModal('modal-account'); showToast(); render();
        }

        function openOppModal(index = null) {
            const isEdit = index !== null;
            document.getElementById('opp-edit-index').value = isEdit ? index : "";
            const data = isEdit ? opps[index] : { name:"", acc:"", amount:0, stage:"", date:"", comp:false, compName:"", memo:"" };
            document.getElementById('opp-name').value = data.name;
            document.getElementById('opp-acc-id').value = data.acc;
            document.getElementById('opp-amount').value = data.amount;
            document.getElementById('opp-stage').value = data.stage;
            document.getElementById('opp-date').value = data.date;
            document.getElementById('opp-comp-check').checked = data.comp;
            document.getElementById('opp-comp-name').value = data.compName;
            document.getElementById('opp-comp-name').disabled = !data.comp;
            document.getElementById('opp-memo').value = data.memo;
            document.getElementById('modal-opp').classList.remove('hidden');
        }

        function saveOpp() {
            const idx = document.getElementById('opp-edit-index').value;
            const newData = {
                name: document.getElementById('opp-name').value, acc: document.getElementById('opp-acc-id').value,
                amount: parseInt(document.getElementById('opp-amount').value || 0), stage: document.getElementById('opp-stage').value,
                date: document.getElementById('opp-date').value, comp: document.getElementById('opp-comp-check').checked,
                compName: document.getElementById('opp-comp-name').value, memo: document.getElementById('opp-memo').value
            };
            if(idx === "") opps.unshift(newData); else opps[idx] = newData;
            closeModal('modal-opp'); showToast(); render();
        }

        function toggleCompetitor(c) {
            const i = document.getElementById('opp-comp-name');
            i.disabled = !c; if(!c) i.value = "";
        }

        function switchTab(t) {
            ['home','accounts','opps'].forEach(v => document.getElementById('view-'+v).classList.add('hidden'));
            ['home','accounts','opps'].forEach(v => document.getElementById('tab-'+v).classList.remove('active'));
            document.getElementById('view-'+t).classList.remove('hidden');
            document.getElementById('tab-'+t).classList.add('active');
        }

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function showToast() {
            const t = document.getElementById('success-toast');
            t.classList.remove('hidden'); setTimeout(() => t.classList.add('hidden'), 2000);
        }

        function changeLanguage(l) { document.documentElement.lang = l; render(); }

        render();
    </script>
</body>
</html>
