<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise CRM V5 - WalkMe Relationship Training</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .slds-blue { background-color: #0176d3; }
        .tab-active { border-bottom: 4px solid #0176d3; font-weight: bold; color: #0176d3; }
        .required::after { content: " *"; color: red; }
        .success-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen">

    <header class="slds-blue text-white p-3 flex justify-between items-center shadow-lg sticky top-0 z-50">
        <div class="flex items-center space-x-6">
            <div class="text-xl font-black italic">GLOBAL CRM V5</div>
            <input type="text" data-i18n-placeholder="search_placeholder" class="rounded-full px-10 py-1.5 text-gray-700 w-80 text-sm outline-none">
        </div>
        <div class="flex items-center space-x-6 text-sm">
            <select onchange="changeLanguage(this.value)" class="bg-blue-800 text-white border border-blue-400 rounded px-2 py-1 text-xs outline-none">
                <option value="ja">日本語 (JP)</option>
                <option value="en">English (US)</option>
            </select>
            <div class="w-8 h-8 bg-green-600 rounded-full flex items-center justify-center text-xs border-2 border-white shadow-sm">USR</div>
        </div>
    </header>

    <nav class="bg-white border-b flex space-x-8 px-10 py-1 text-sm text-gray-600 shadow-sm sticky top-[56px] z-40">
        <button onclick="switchTab('home')" id="tab-home" class="py-3 px-2 tab-active" data-i18n="nav_home">ホーム</button>
        <button onclick="switchTab('accounts')" id="tab-accounts" class="py-3 px-2" data-i18n="nav_accounts">取引先</button>
        <button onclick="switchTab('opps')" id="tab-opps" class="py-3 px-2" data-i18n="nav_opps">商談</button>
    </nav>

    <main class="p-8 max-w-7xl mx-auto">
        
        <div id="view-accounts" class="hidden">
            <div class="flex justify-between items-end mb-6">
                <h1 class="text-3xl font-bold" data-i18n="acc_recent">取引先一覧</h1>
                <button onclick="openModal('modal-account')" id="btn-new-account" class="bg-blue-600 text-white px-6 py-2 rounded font-bold shadow-md hover:bg-blue-700 transition" data-i18n="btn_new_acc">新規取引先</button>
            </div>
            <div class="bg-white shadow-xl rounded-xl overflow-hidden border border-gray-200 text-sm">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b text-gray-400 font-bold uppercase">
                        <tr><th class="p-4" data-i18n="th_acc_name">取引先名</th><th class="p-4" data-i18n="th_phone">電話</th><th class="p-4" data-i18n="lbl_industry">業種</th></tr>
                    </thead>
                    <tbody id="account-table-body"></tbody>
                </table>
            </div>
        </div>

        <div id="view-opps" class="hidden">
            <div class="flex justify-between items-end mb-6">
                <h1 class="text-3xl font-bold" data-i18n="nav_opps">商談管理</h1>
                <button onclick="openModal('modal-opp')" id="btn-new-opp" class="bg-green-600 text-white px-6 py-2 rounded font-bold shadow-md hover:bg-green-700 transition" data-i18n="btn_new_opp">新規商談登録</button>
            </div>
            <div class="bg-white shadow rounded-xl p-10 border border-gray-200">
                <table class="w-full text-left text-sm">
                    <thead class="bg-gray-50 border-b text-gray-400">
                        <tr><th class="p-4">商談名</th><th class="p-4">取引先名</th><th class="p-4">フェーズ</th></tr>
                    </thead>
                    <tbody id="opp-table-body">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="view-home">
            <h1 class="text-3xl font-bold mb-8" data-i18n="dash_welcome">ダッシュボード</h1>
            <div class="bg-blue-50 border-2 border-blue-200 p-8 rounded-2xl">
                <p class="text-blue-800 font-bold" data-i18n="dash_info">新しい商談を作成する前に、まずは「取引先」を登録してください。</p>
            </div>
        </div>
    </main>

    <div id="modal-account" class="fixed inset-0 bg-black bg-opacity-60 hidden flex items-center justify-center z-[60]">
        <div class="bg-white rounded-2xl shadow-2xl w-[600px]">
            <div class="p-5 border-b flex justify-between items-center">
                <h2 class="text-xl font-bold" data-i18n="modal_acc_title">新規取引先登録</h2>
                <button onclick="closeModal('modal-account')" class="text-gray-400">✕</button>
            </div>
            <div class="p-8 space-y-4">
                <div>
                    <label class="block text-xs font-bold mb-1 required" data-i18n="th_acc_name">取引先名</label>
                    <input type="text" id="acc-name-input" class="w-full border-2 p-2 rounded outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-bold mb-1" data-i18n="th_phone">電話</label>
                    <input type="text" id="acc-phone-input" class="w-full border-2 p-2 rounded outline-none">
                </div>
            </div>
            <div class="p-5 border-t bg-gray-50 flex justify-end space-x-3">
                <button onclick="closeModal('modal-account')" class="px-6 py-2 text-gray-500" data-i18n="btn_cancel">キャンセル</button>
                <button onclick="addNewAccount()" id="acc-save-btn" class="px-8 py-2 bg-blue-600 text-white rounded font-bold" data-i18n="btn_save">保存</button>
            </div>
        </div>
    </div>

    <div id="modal-opp" class="fixed inset-0 bg-black bg-opacity-60 hidden flex items-center justify-center z-[60]">
        <div class="bg-white rounded-2xl shadow-2xl w-[600px]">
            <div class="p-5 border-b flex justify-between items-center">
                <h2 class="text-xl font-bold" data-i18n="btn_new_opp">新規商談登録</h2>
                <button onclick="closeModal('modal-opp')" class="text-gray-400">✕</button>
            </div>
            <div class="p-8 space-y-4">
                <div>
                    <label class="block text-xs font-bold mb-1 required" data-i18n="lbl_opp_name">商談名</label>
                    <input type="text" id="opp-name-input" class="w-full border-2 p-2 rounded outline-none focus:border-green-500">
                </div>
                <div>
                    <label class="block text-xs font-bold mb-1 required" data-i18n="th_acc_name">取引先名 (紐付け)</label>
                    <select id="opp-account-select" class="w-full border-2 p-2 rounded outline-none">
                        </select>
                </div>
                <div>
                    <label class="block text-xs font-bold mb-1 required" data-i18n="lbl_opp_stage">フェーズ</label>
                    <select id="opp-stage-select" class="w-full border-2 p-2 rounded outline-none">
                        <option value="Prospecting" data-i18n="stg_prospect">見込み把握</option>
                        <option value="Proposal" data-i18n="stg_proposal">提案/見積</option>
                        <option value="Closed" data-i18n="stg_closed">受注完了</option>
                    </select>
                </div>
            </div>
            <div class="p-5 border-t bg-gray-50 flex justify-end space-x-3">
                <button onclick="closeModal('modal-opp')" class="px-6 py-2 text-gray-500" data-i18n="btn_cancel">キャンセル</button>
                <button onclick="addNewOpportunity()" id="opp-save-btn" class="px-8 py-2 bg-green-600 text-white rounded font-bold" data-i18n="btn_save">保存</button>
            </div>
        </div>
    </div>

    <div id="success-overlay" class="fixed inset-0 bg-blue-900 bg-opacity-95 hidden flex flex-col items-center justify-center z-[100]">
        <div class="success-pop flex flex-col items-center text-white text-center">
            <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center mb-6 shadow-2xl">
                <svg class="w-12 h-12 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 class="text-3xl font-black mb-2" data-i18n="success_msg">保存完了！</h2>
            <button onclick="closeSuccess()" class="mt-8 px-10 py-3 bg-green-500 text-white rounded-full font-black shadow-xl uppercase tracking-widest" data-i18n="btn_close">閉じる</button>
        </div>
    </div>

    <script>
        // データストレージ（セッション内のみ）
        let currentLang = 'ja';
        let accounts = [
            { name: "株式会社日本インフラ", phone: "03-1234-5678", industry: "製造" },
            { name: "Global Logistics Inc.", phone: "06-9999-0000", industry: "運輸" }
        ];
        let opportunities = [];

        const translations = {
            ja: {
                search_placeholder: "検索...", nav_home: "ホーム", nav_accounts: "取引先", nav_opps: "商談",
                acc_recent: "取引先一覧", btn_new_acc: "新規取引先", th_acc_name: "取引先名", th_phone: "電話",
                lbl_industry: "業種", btn_new_opp: "新規商談登録", lbl_opp_name: "商談名", lbl_opp_stage: "フェーズ",
                stg_prospect: "見込み把握", stg_proposal: "提案/見積", stg_closed: "受注完了",
                btn_cancel: "キャンセル", btn_save: "保存", btn_close: "閉じる", success_msg: "保存完了！",
                dash_welcome: "ダッシュボード", dash_info: "新しい商談を作成する前に、まずは「取引先」を登録してください。",
                modal_acc_title: "新規取引先登録"
            },
            en: {
                search_placeholder: "Search...", nav_home: "Home", nav_accounts: "Accounts", nav_opps: "Opportunities",
                acc_recent: "Account List", btn_new_acc: "New Account", th_acc_name: "Account Name", th_phone: "Phone",
                lbl_industry: "Industry", btn_new_opp: "New Opportunity", lbl_opp_name: "Opportunity Name", lbl_opp_stage: "Stage",
                stg_prospect: "Prospecting", stg_proposal: "Proposal/Quote", stg_closed: "Closed Won",
                btn_cancel: "Cancel", btn_save: "Save", btn_close: "Close", success_msg: "Saved!",
                dash_welcome: "Dashboard", dash_info: "Please register an 'Account' before creating a new Opportunity.",
                modal_acc_title: "New Account Registration"
            }
        };

        // UI更新関数
        function renderAll() {
            // 取引先テーブル
            const accBody = document.getElementById('account-table-body');
            accBody.innerHTML = accounts.map(a => `<tr class="border-b hover:bg-gray-50"><td class="p-4 font-bold text-blue-600">${a.name}</td><td class="p-4 text-gray-500">${a.phone}</td><td class="p-4 text-gray-500">${a.industry}</td></tr>`).join('');

            // 商談テーブル
            const oppBody = document.getElementById('opp-table-body');
            oppBody.innerHTML = opportunities.map(o => `<tr class="border-b"><td class="p-4 font-bold">${o.name}</td><td class="p-4 text-blue-600 font-medium">${o.account}</td><td class="p-4"><span class="bg-gray-100 px-2 py-1 rounded text-xs">${o.stage}</span></td></tr>`).join('');

            // 商談モーダルの取引先セレクトボックス
            const select = document.getElementById('opp-account-select');
            const noneLabel = currentLang === 'ja' ? '--なし--' : '--None--';
            select.innerHTML = `<option value="">${noneLabel}</option>` + accounts.map(a => `<option value="${a.name}">${a.name}</option>`).join('');
        }

        // 新規登録アクション
        function addNewAccount() {
            const name = document.getElementById('acc-name-input').value;
            const phone = document.getElementById('acc-phone-input').value;
            if(!name) return alert("Name is required");
            accounts.push({ name, phone, industry: "テクノロジー" });
            document.getElementById('acc-name-input').value = "";
            showSuccess();
            closeModal('modal-account');
            renderAll();
        }

        function addNewOpportunity() {
            const name = document.getElementById('opp-name-input').value;
            const account = document.getElementById('opp-account-select').value;
            const stage = document.getElementById('opp-stage-select').value;
            if(!name || !account) return alert("Name and Account are required");
            opportunities.push({ name, account, stage });
            document.getElementById('opp-name-input').value = "";
            showSuccess();
            closeModal('modal-opp');
            renderAll();
        }

        // 基本機能
        function changeLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('[data-i18n]').forEach(el => { el.innerText = translations[lang][el.getAttribute('data-i18n')]; });
            renderAll();
        }

        function switchTab(tab) {
            ['view-home', 'view-accounts', 'view-opps'].forEach(v => document.getElementById(v).classList.add('hidden'));
            ['tab-home', 'tab-accounts', 'tab-opps'].forEach(t => document.getElementById(t).classList.remove('tab-active'));
            document.getElementById('view-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab).classList.add('tab-active');
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function showSuccess() { document.getElementById('success-overlay').classList.remove('hidden'); }
        function closeSuccess() { document.getElementById('success-overlay').classList.add('hidden'); }

        // 初期表示
        renderAll();
    </script>
</body>
</html>
